services:
  smart-hawk:
    build:
      context: .
      dockerfile: Dockerfile
    image: smart-hawk:local
    container_name: smart-hawk
    restart: on-failure:5
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:/data/smart-hawk.db?mode=rwc
      RUST_LOG: ${RUST_LOG:-info,smart_hawk=debug,teloxide=info}
      RUST_BACKTRACE: "1"
    volumes:
      - smart-hawk-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    init: true

volumes:
  smart-hawk-data:
